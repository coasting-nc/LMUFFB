name: Build and Test

on:
  push:
    branches: [ "**" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-release:
    name: Windows Release Build
    runs-on: windows-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 100M
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Install Ccache (Windows)
      shell: pwsh
      run: |
        choco install ccache
        echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Ccache Cache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Install ImGui
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path "vendor\imgui" -Force
        Invoke-WebRequest -Uri "https://github.com/ocornut/imgui/archive/refs/heads/master.zip" -OutFile "vendor\imgui-master.zip"
        Expand-Archive -Path "vendor\imgui-master.zip" -DestinationPath "vendor" -Force
        Copy-Item "vendor\imgui-master\*" -Destination "vendor\imgui\" -Recurse -Force
        Test-Path "vendor\imgui\imgui.cpp"
        Remove-Item -Path "vendor\imgui-master.zip", "vendor\imgui-master" -Recurse -Force

    - name: Configure and Build (Release)
      shell: pwsh
      run: |
        cmake -S . -B build -DLMUFFB_USE_UNITY_BUILD=ON
        cmake --build build --config Release --clean-first

    - name: Decode Certificate to Temp
      shell: pwsh
      run: |
        # Use the runner's isolated temp directory, NOT the project workspace
        $certPath = Join-Path $env:RUNNER_TEMP "lmuffb_secure_cert.pfx"
        
        # Decode and save
        $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.CERT_PFX_BASE64 }}")
        [IO.File]::WriteAllBytes($certPath, $pfx_cert_byte)
        
        # Save the path to a GitHub environment variable so the next steps can find it
        "SECURE_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "Certificate securely decoded to outside of workspace."

    - name: Sign Executable
      shell: pwsh
      run: |
        $exePath = "build\Release\LMUFFB.exe"
        if (-not (Test-Path $exePath)) { throw "Executable not found for signing!" }
        
        Write-Host "Signing $exePath..."
        signtool sign /f $env:SECURE_CERT_PATH /p "${{ secrets.CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exePath

    - name: Cleanup Certificate
      if: always() # This ensures it runs EVEN IF the signing step fails
      shell: pwsh
      run: |
        if (Test-Path $env:SECURE_CERT_PATH) {
            Remove-Item -Path $env:SECURE_CERT_PATH -Force
            Write-Host "Certificate successfully wiped from runner."
        }

    - name: Windows Defender Behavioral & Static Scan
      shell: pwsh
      run: |
        $exePath = "build\Release\LMUFFB.exe"
        
        if (-not (Test-Path $exePath)) {
            Write-Error "Executable not found! Quarantined during build."
            exit 1
        }
        
        $scanDir = "C:\AV_Scan"
        New-Item -ItemType Directory -Path $scanDir -Force | Out-Null
        $tempPath = Join-Path $scanDir "LMUFFB_scan.exe"
        Copy-Item -Path $exePath -Destination $tempPath -Force
        
        Write-Host "--- Waking up Windows Defender ---"
        
        # 1. Enable Real-time, Behavioral, and Cloud ML Protection
        Set-MpPreference -DisableRealtimeMonitoring $false `
                         -DisableBehaviorMonitoring $false `
                         -DisableArchiveScanning $false `
                         -DisableIOAVProtection $false `
                         -MAPSReporting Advanced `
                         -SubmitSamplesConsent SendAllSamples
                         
        # 2. Dynamically remove ALL path exclusions to ensure the static scan runs
        $prefs = Get-MpPreference
        if ($prefs.ExclusionPath) {
            foreach ($path in $prefs.ExclusionPath) {
                Remove-MpPreference -ExclusionPath $path -ErrorAction SilentlyContinue
            }
        }
        Remove-MpPreference -ExclusionExtension ".exe" -ErrorAction SilentlyContinue
        
        # 3. Verify Engine State
        $newPrefs = Get-MpPreference
        Write-Host "Real-time Protection Disabled: $($newPrefs.DisableRealtimeMonitoring)"
        Write-Host "Behavior Monitoring Disabled: $($newPrefs.DisableBehaviorMonitoring)"
        Write-Host "Cloud Protection (MAPS): $($newPrefs.MAPSReporting)"
        Write-Host "Remaining Exclusions: $($newPrefs.ExclusionPath)"
        Write-Host "----------------------------------`n"
        
        # 4. Static Scan
        Write-Host "1. Running Static Scan..."
        & "C:\Program Files\Windows Defender\MpCmdRun.exe" -Scan -ScanType 3 -File "$tempPath"
        if ($LASTEXITCODE -eq 2) {
            Write-Error "❌ Static Scan Failed! Threat detected."
            exit 1
        }
        Write-Host "✅ Static Scan Passed.`n"
        
        # 5. Behavioral Scan (Execution)
        Write-Host "2. Running Behavioral Scan (Executing App in Headless Mode)..."
        $process = Start-Process -FilePath $tempPath -ArgumentList "--headless" -PassThru -WindowStyle Hidden
        
        Write-Host "App is running. Waiting 10 seconds for Defender ML evaluation..."
        Start-Sleep -Seconds 10
        
        $process.Refresh()
        if ($process.HasExited) {
            if (-not (Test-Path $tempPath)) {
                Write-Error "❌ Behavioral Scan Failed! Defender killed the process and quarantined the file."
                exit 1
            } else {
                Write-Host "⚠️ Process exited on its own (Exit Code: $($process.ExitCode)). File was not quarantined."
            }
        } else {
            Write-Host "✅ Behavioral Scan Passed. Process survived without being flagged."
            
            # Clean up the running process AND WAIT for it to release the file lock
            Stop-Process -Id $process.Id -Force -PassThru | Wait-Process
            
            # Give the OS file system a tiny fraction of a second to catch up
            Start-Sleep -Milliseconds 500 
        }
        
        # 6. Cleanup
        Remove-Item -Path $scanDir -Recurse -Force

    - name: Run Tests
      shell: pwsh
      run: |
        .\build\tests\Release\run_combined_tests.exe



    - name: Get Version
      shell: pwsh
      run: |
        $version = (Get-Content VERSION -Raw).Trim()
        Write-Host ">>> Workflow VERSION file content: [$version]"
        "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host ">>> Workflow APP_VERSION set to environment."

    - name: Package Artifacts
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path "dist" -Force
        Copy-Item "build/Release/LMUFFB.exe" -Destination "dist/"
        Copy-Item "build/Release/README.txt" -Destination "dist/"
        Copy-Item "build/Release/tools" -Destination "dist/" -Recurse
        Compress-Archive -Path "dist/*" -DestinationPath "lmuffb-${{ env.APP_VERSION }}-nightly.zip"

    - name: Verify Zip Security (Kill Switch)
      shell: pwsh
      run: |
        # Find the zip file we just created
        $zipFile = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
        if (-not $zipFile) { throw "No zip file found to verify!" }
        
        Write-Host "Verifying contents of $($zipFile.Name) for leaked certificates..."
        
        # Load .NET Zip assembly to read the zip without extracting it
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $zip =[System.IO.Compression.ZipFile]::OpenRead($zipFile.FullName)
        
        $leaked = $false
        foreach ($entry in $zip.Entries) {
            # Check if any file inside the zip has a certificate-related extension
            if ($entry.FullName -match "\.(pfx|p12|pem|key|cer|crt|der|pvk)$") {
                Write-Error "🚨 SECURITY BREACH: Certificate or Key file found inside release zip: $($entry.FullName)"
                $leaked = $true
            }
        }
        $zip.Dispose()
        
        if ($leaked) {
            # Destroy the compromised zip file immediately
            Remove-Item $zipFile.FullName -Force
            Write-Error "🚨 The compromised zip file has been destroyed. Failing workflow."
            exit 1
        } else {
            Write-Host "✅ Zip verification passed. No certificates found inside the archive."
        }

    - name: Upload Nightly Zip
      uses: actions/upload-artifact@v4
      with:
        name: lmuffb-${{ env.APP_VERSION }}-nightly
        path: lmuffb-${{ env.APP_VERSION }}-nightly.zip
        retention-days: 90

  windows-python-tests:
    name: Windows Python Tests
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cache Virtual Environment
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        python -m venv .venv
        .venv\Scripts\Activate.ps1
        pip install -r requirements.txt

    - name: Run Python Tests
      shell: pwsh
      run: |
        .venv\Scripts\Activate.ps1
        $env:PYTHONPATH = "$(Get-Location)/tools"
        python -m pytest tests tools/lmuffb_log_analyzer/tests

  linux-coverage:
    name: Linux Coverage (Debug)
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov libglfw3-dev libopengl-dev clang-tidy ccache

    - name: Ccache Cache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Install ImGui (Linux)
      run: |
        mkdir -p vendor/imgui
        wget https://github.com/ocornut/imgui/archive/refs/heads/master.zip -O vendor/imgui-master.zip
        unzip vendor/imgui-master.zip -d vendor/
        cp -r vendor/imgui-master/* vendor/imgui/
        rm -rf vendor/imgui-master.zip vendor/imgui-master

    - name: Configure and Build (Debug + Coverage)
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_HEADLESS=ON -DENABLE_COVERAGE=ON -DCMAKE_CXX_CLANG_TIDY="clang-tidy"

        cmake --build build --config Debug

    - name: Run Tests
      run: |
        ./build/tests/run_combined_tests

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cache Virtual Environment
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-cov-${{ hashFiles('requirements.txt') }}

    - name: Install Python Dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: |
        python3 -m venv .venv
        source .venv/bin/activate
        pip install -r requirements.txt
        pip install pytest-cov lcov_cobertura

    - name: Run Python Tests (with Coverage)
      run: |
        source .venv/bin/activate
        export PYTHONPATH=$PYTHONPATH:$(pwd)/tools
        python3 -m pytest --cov=tools --cov=scripts --cov-report=xml:python_cobertura.xml tests tools/lmuffb_log_analyzer/tests

    - name: Collect Coverage
      run: |
        lcov --capture --directory . --output-file coverage.info --rc branch_coverage=1 --ignore-errors mismatch,gcov,unused
        lcov --extract coverage.info "*/src/*" --output-file coverage_filtered.info --rc branch_coverage=1 --ignore-errors unused
        lcov --remove coverage_filtered.info "*/src/ext/toml++/*" --output-file coverage_filtered.info --rc branch_coverage=1 --ignore-errors unused
        genhtml coverage_filtered.info --output-directory coverage_report --rc branch_coverage=1 --ignore-errors source
        
        # Use tool to convert lcov to cobertura for the summary script (installed in venv)
        source .venv/bin/activate
        lcov_cobertura coverage_filtered.info --output cobertura.xml

    - name: Generate Coverage Summaries
      run: |
        source .venv/bin/activate
        # Ensure directory exists
        mkdir -p docs/dev_docs/reports/coverage/

        # C++ Summary
        if [ -f "cobertura.xml" ]; then
          python3 scripts/coverage_summary.py cobertura.xml
          
          echo "### Linux C++ Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '#### Line Coverage' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat docs/dev_docs/reports/coverage/coverage_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo '#### Branch Coverage' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat docs/dev_docs/reports/coverage/coverage_branches_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo '#### Function Coverage' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat docs/dev_docs/reports/coverage/coverage_functions_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "cobertura.xml not found!"
          exit 1
        fi

        # Python Summary
        if [ -f "python_cobertura.xml" ]; then
          python3 scripts/python_coverage_summary.py python_cobertura.xml
          
          echo "### Python Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '#### Line Coverage' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat docs/dev_docs/reports/coverage/python_coverage_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo '#### Branch Coverage' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat docs/dev_docs/reports/coverage/python_coverage_branches_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo '#### Function Coverage' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat docs/dev_docs/reports/coverage/python_coverage_functions_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Coverage Summaries
      uses: actions/upload-artifact@v4
      with:
        name: coverage-summaries
        path: |
          docs/dev_docs/reports/coverage/coverage_summary.txt
          docs/dev_docs/reports/coverage/coverage_branches_summary.txt
          docs/dev_docs/reports/coverage/coverage_functions_summary.txt
        retention-days: 14

    - name: Upload Coverage Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-coverage-report
        path: coverage_report/
        retention-days: 14

  linux-sanitizers:
    name: Linux Sanitizers (ASan/UBSan)
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglfw3-dev libopengl-dev ccache

    - name: Ccache Cache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Install ImGui (Linux)
      run: |
        mkdir -p vendor/imgui
        wget https://github.com/ocornut/imgui/archive/refs/heads/master.zip -O vendor/imgui-master.zip
        unzip vendor/imgui-master.zip -d vendor/
        cp -r vendor/imgui-master/* vendor/imgui/
        rm -rf vendor/imgui-master.zip vendor/imgui-master

    - name: Configure and Build (ASan + UBSan)
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_HEADLESS=ON -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
        cmake --build build --config Debug

    - name: Run Tests with Sanitizers
      run: |
        export ASAN_OPTIONS=detect_leaks=1:symbolize=1
        export UBSAN_OPTIONS=print_stacktrace=1
        ./build/tests/run_combined_tests

  deploy-coverage:
    name: Deploy Hub to GitHub Pages
    runs-on: ubuntu-latest
    needs: [windows-release, windows-python-tests, linux-coverage, linux-sanitizers]
    if: github.event_name == 'push'
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'github-pages' || 'branch-previews' }}
      url: ${{ steps.deployment.outputs.page_url }}${{ steps.target.outputs.subdir == '.' && '' || '/' }}${{ steps.target.outputs.subdir }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Prepare site directory
      shell: bash
      run: |
        mkdir site
        cd site
        git init
        git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        # Try to fetch existing content, but don't fail if it's the first time
        if git fetch origin gh-pages --depth=1; then
          git checkout gh-pages
          echo "Checked out existing gh-pages branch"
        else
          git checkout -b gh-pages
          echo "Created new gh-pages branch"
        fi

    - name: Download coverage artifact
      uses: actions/download-artifact@v4
      with:
        name: linux-coverage-report
        path: temp_report

    - name: Download Windows zip artifact
      uses: actions/download-artifact@v4
      with:
        path: temp_download
        merge-multiple: true

    - name: Determine Deployment Target
      id: target
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "subdir=." >> $GITHUB_OUTPUT
          echo "is_main=true" >> $GITHUB_OUTPUT
        else
          # Sanitize branch name for URL (replace / with -)
          SAFE_NAME=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "subdir=branches/$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "is_main=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate Content
      run: |
        SUBDIR="${{ steps.target.outputs.subdir }}"
        
        # Clear existing content for this subdir to avoid stale artifacts
        rm -rf "site/$SUBDIR/report"
        rm -rf "site/$SUBDIR/download"
        mkdir -p "site/$SUBDIR/report"
        mkdir -p "site/$SUBDIR/download"
        
        # Find the zip file name from the FRESH download
        ZIP_NAME=$(basename $(ls temp_download/*.zip | head -n 1))
        echo "Found new artifact: $ZIP_NAME"
        
        # Copy current build artifacts to the target subfolder
        cp -r temp_report/* "site/$SUBDIR/report/"
        cp -f temp_download/*.zip "site/$SUBDIR/download/"
        cp -f icon/icon.png "site/$SUBDIR/icon.png"
        
        # Generate the landing page for this target
        if [[ "${{ steps.target.outputs.is_main }}" == "true" ]]; then
          PAGE_TITLE="lmuFFB Nightly Hub"
          PAGE_DESC="Automated builds and reports from the <code>main</code> branch."
          BRANCH_INFO=""
          BACK_LINK=""
        else
          PAGE_TITLE="lmuFFB Development Preview"
          PAGE_DESC="Automated builds and reports from the experimental <code>${{ github.ref_name }}</code> branch."
          BRANCH_INFO="<p style='background: #fffbdd; padding: 10px; border: 1px solid #d4a017; border-radius: 6px;'>⚠️ <strong>Notice:</strong> This is a development build from a feature branch. For the latest nightly build (main branch), visit the <a href='../../'>Main Hub</a>.</p>"
          BACK_LINK="<p><a href='../../'>&larr; Back to Main Hub</a></p>"
        fi

        cat <<EOF > "site/$SUBDIR/index.html"
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>$PAGE_TITLE</title>
            <link rel="icon" type="image/png" href="icon.png">
            <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #24292f; }
                .header-container { display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #d0d7de; padding-bottom: .3em; margin-bottom: 24px; }
                .header-container img { width: 48px; height: 48px; border-radius: 8px; }
                .header-container h1 { border-bottom: none; margin: 0; padding-bottom: 0; }
                .card { border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; margin: 20px 0; background-color: #f6f8fa; }
                .btn { display: inline-block; background-color: #238636; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: 600; }
                .btn:hover { background-color: #2ea043; }
                footer { margin-top: 50px; color: #57606a; font-size: 0.9em; border-top: 1px solid #d0d7de; padding-top: 20px; }
                code { background: #afb8c133; padding: .2em .4em; border-radius: 6px; }
            </style>
        </head>
        <body>
            $BACK_LINK
            <div class="header-container">
                <img src="icon.png" alt="lmuFFB Logo">
                <h1>$PAGE_TITLE</h1>
            </div>
            $BRANCH_INFO
            <p>$PAGE_DESC</p>
            
            <div class="card">
                <h2>🚀 Latest Build</h2>
                <p>Download the latest version of lmuFFB compiled from this branch.</p>
                <p><strong>File:</strong> <code>$ZIP_NAME</code></p>
                <a href="download/$ZIP_NAME" class="btn">Download ZIP</a>
            </div>

            <h2>📊 Quality Reports</h2>
            <ul>
                <li><a href="report/index.html">Code Coverage Report</a> (Linux/GCC/LCOV)</li>
            </ul>

            <footer>
                Last updated: $(date -u) UTC | Branch: <code>${{ github.ref_name }}</code> | Commit: <code>${{ github.sha }}</code> | <a href="https://github.com/${{ github.repository }}">Source Code</a>
            </footer>
        </body>
        </html>
        EOF

    - name: Persist site to gh-pages branch
      shell: bash
      run: |
        cd site
        # If .git doesn't exist (first run or checkout failed), initialize it
        if [ ! -d ".git" ]; then
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        fi
        
        # Ensure we are on the gh-pages branch
        # -M renames the current branch (master/main) to gh-pages if it's a fresh repo
        git branch -M gh-pages
        
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        git add .
        
        # Only commit and push if there are changes
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Update ${{ steps.target.outputs.subdir }} from ${{ github.ref_name }}@${{ github.sha }}"
          # Use --force if it's the first time or if the remote has diverged and we want to overwrite 
          # (though with the checkout-merge strategy we should be fast-forwarding mostly)
          git push origin gh-pages
        else
          echo "No changes to commit"
        fi

    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: site
    
    - name: Deploy to GitHub Pages
