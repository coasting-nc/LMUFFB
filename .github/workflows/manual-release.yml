name: Manual Release

on:
  workflow_dispatch:
    inputs:
      is_draft:
        description: 'Create as a draft release?'
        type: boolean
        default: false
      is_prerelease:
        description: 'Mark as a pre-release?'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content VERSION -Raw).Trim()
          if (-not $ver) { throw "VERSION file is empty" }
          "TAG=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Target Version: $ver (Tag: v$ver)"

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install ImGui
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "vendor\imgui" -Force
          Invoke-WebRequest -Uri "https://github.com/ocornut/imgui/archive/refs/heads/master.zip" -OutFile "vendor\imgui-master.zip"
          Expand-Archive -Path "vendor\imgui-master.zip" -DestinationPath "vendor" -Force
          Copy-Item "vendor\imgui-master\*" -Destination "vendor\imgui\" -Recurse -Force
          Remove-Item -Path "vendor\imgui-master.zip", "vendor\imgui-master" -Recurse -Force

      - name: Configure and Build (Release)
        shell: pwsh
        run: |
          cmake -S . -B build -DLMUFFB_USE_UNITY_BUILD=ON
          cmake --build build --config Release --clean-first

      - name: Decode Certificate to Temp
        shell: pwsh
        run: |
          # Use the runner's isolated temp directory, NOT the project workspace
          $certPath = Join-Path $env:RUNNER_TEMP "lmuffb_secure_cert.pfx"
          
          # Decode and save
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.CERT_PFX_BASE64 }}")
          [IO.File]::WriteAllBytes($certPath, $pfx_cert_byte)
          
          # Save the path to a GitHub environment variable so the next steps can find it
          "SECURE_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Certificate securely decoded to outside of workspace."

      - name: Sign Executable
        shell: pwsh
        run: |
          $exePath = "build\Release\LMUFFB.exe"
          if (-not (Test-Path $exePath)) { throw "Executable not found for signing!" }
          
          Write-Host "Signing $exePath..."
          signtool sign /f $env:SECURE_CERT_PATH /p "${{ secrets.CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exePath

      - name: Cleanup Certificate
        if: always() # This ensures it runs EVEN IF the signing step fails
        shell: pwsh
        run: |
          if (Test-Path $env:SECURE_CERT_PATH) {
              Remove-Item -Path $env:SECURE_CERT_PATH -Force
              Write-Host "Certificate successfully wiped from runner."
          }

      - name: Windows Defender Behavioral & Static Scan
        shell: pwsh
        run: |
          $exePath = "build\Release\LMUFFB.exe"
          
          if (-not (Test-Path $exePath)) {
              Write-Error "Executable not found! Quarantined during build."
              exit 1
          }
          
          $scanDir = "C:\AV_Scan"
          New-Item -ItemType Directory -Path $scanDir -Force | Out-Null
          $tempPath = Join-Path $scanDir "LMUFFB_scan.exe"
          Copy-Item -Path $exePath -Destination $tempPath -Force
          
          Write-Host "--- Waking up Windows Defender ---"
          
          # 1. Enable Real-time, Behavioral, and Cloud ML Protection
          Set-MpPreference -DisableRealtimeMonitoring $false `
                           -DisableBehaviorMonitoring $false `
                           -DisableArchiveScanning $false `
                           -DisableIOAVProtection $false `
                           -MAPSReporting Advanced `
                           -SubmitSamplesConsent SendAllSamples
                           
          # 2. Dynamically remove ALL path exclusions to ensure the static scan runs
          $prefs = Get-MpPreference
          if ($prefs.ExclusionPath) {
              foreach ($path in $prefs.ExclusionPath) {
                  Remove-MpPreference -ExclusionPath $path -ErrorAction SilentlyContinue
              }
          }
          Remove-MpPreference -ExclusionExtension ".exe" -ErrorAction SilentlyContinue
          
          # 3. Verify Engine State
          $newPrefs = Get-MpPreference
          Write-Host "Real-time Protection Disabled: $($newPrefs.DisableRealtimeMonitoring)"
          Write-Host "Behavior Monitoring Disabled: $($newPrefs.DisableBehaviorMonitoring)"
          Write-Host "Cloud Protection (MAPS): $($newPrefs.MAPSReporting)"
          Write-Host "Remaining Exclusions: $($newPrefs.ExclusionPath)"
          Write-Host "----------------------------------`n"
          
          # 4. Static Scan
          Write-Host "1. Running Static Scan..."
          & "C:\Program Files\Windows Defender\MpCmdRun.exe" -Scan -ScanType 3 -File "$tempPath"
          if ($LASTEXITCODE -eq 2) {
              Write-Error "❌ Static Scan Failed! Threat detected."
              exit 1
          }
          Write-Host "✅ Static Scan Passed.`n"
          
          # 5. Behavioral Scan (Execution)
          Write-Host "2. Running Behavioral Scan (Executing App in Headless Mode)..."
          $process = Start-Process -FilePath $tempPath -ArgumentList "--headless" -PassThru -WindowStyle Hidden
          
          Write-Host "App is running. Waiting 10 seconds for Defender ML evaluation..."
          Start-Sleep -Seconds 10
          
          $process.Refresh()
          if ($process.HasExited) {
              if (-not (Test-Path $tempPath)) {
                  Write-Error "❌ Behavioral Scan Failed! Defender killed the process and quarantined the file."
                  exit 1
              } else {
                  Write-Host "⚠️ Process exited on its own (Exit Code: $($process.ExitCode)). File was not quarantined."
              }
          } else {
              Write-Host "✅ Behavioral Scan Passed. Process survived without being flagged."
              
              # Clean up the running process AND WAIT for it to release the file lock
              Stop-Process -Id $process.Id -Force -PassThru | Wait-Process
              
              # Give the OS file system a tiny fraction of a second to catch up
              Start-Sleep -Milliseconds 500 
          }
          
          # 6. Cleanup
          Remove-Item -Path $scanDir -Recurse -Force

      - name: Run Tests
        shell: pwsh
        run: |
          .\build\tests\Release\run_combined_tests.exe
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Virtual Environment
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python Dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          python -m venv .venv
          .venv\Scripts\Activate.ps1
          pip install -r requirements.txt

      - name: Run Python Tests
        shell: pwsh
        run: |
          .venv\Scripts\Activate.ps1
          $env:PYTHONPATH = "$(Get-Location)/tools"
          python -m pytest tests tools/lmuffb_log_analyzer/tests

      - name: Package Artifacts
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          New-Item -ItemType Directory -Path "dist" -Force
          Copy-Item "build/Release/LMUFFB.exe" -Destination "dist/"
          Copy-Item "build/Release/README.txt" -Destination "dist/"
          Copy-Item "build/Release/tools" -Destination "dist/" -Recurse
          Compress-Archive -Path "dist/*" -DestinationPath "lmuffb-$ver.zip"

      - name: Verify Zip Security (Kill Switch)
        shell: pwsh
        run: |
          # Find the zip file we just created
          $zipFile = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
          if (-not $zipFile) { throw "No zip file found to verify!" }
          
          Write-Host "Verifying contents of $($zipFile.Name) for leaked certificates..."
          
          # Load .NET Zip assembly to read the zip without extracting it
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip =[System.IO.Compression.ZipFile]::OpenRead($zipFile.FullName)
          
          $leaked = $false
          foreach ($entry in $zip.Entries) {
              # Check if any file inside the zip has a certificate-related extension
              if ($entry.FullName -match "\.(pfx|p12|pem|key|cer|crt|der|pvk)$") {
                  Write-Error "🚨 SECURITY BREACH: Certificate or Key file found inside release zip: $($entry.FullName)"
                  $leaked = $true
              }
          }
          $zip.Dispose()
          
          if ($leaked) {
              # Destroy the compromised zip file immediately
              Remove-Item $zipFile.FullName -Force
              Write-Error "🚨 The compromised zip file has been destroyed. Failing workflow."
              exit 1
          } else {
              Write-Host "✅ Zip verification passed. No certificates found inside the archive."
          }

      - name: Extract Latest Changelog Entry
        id: changelog
        shell: pwsh
        run: |
          $content = Get-Content CHANGELOG_DEV.md -Raw
          # Regex explained:
          # (?s)      -> Single-line mode (. matches newlines)
          # (## \[    -> Starts with "## ["
          # [^\]]+    -> Matches the version number inside brackets
          # \].+?     -> Matches close bracket and content (non-greedy)
          # (?=## \[  -> Looks ahead for the next version header
          # |\z)      -> OR stops at end of file
          $regex = '(?s)(## \[[^\]]+\].+?)(?=## \[|\z)'
          
          if ($content -match $regex) {
              $latestEntry = $Matches[1].Trim()
              $latestEntry | Out-File -FilePath "LATEST_RELEASE_NOTES.md" -Encoding utf8
              Write-Host "Successfully extracted latest entry."
          } else {
              Write-Host "Warning: Regex failed to extract entry. Using fallback."
              "Release of version ${{ steps.version.outputs.VERSION }}" | Out-File -FilePath "LATEST_RELEASE_NOTES.md" -Encoding utf8
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body_path: LATEST_RELEASE_NOTES.md
          files: |
            lmuffb-${{ steps.version.outputs.VERSION }}.zip
          draft: ${{ github.event.inputs.is_draft }}
          prerelease: ${{ github.event.inputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          generate_release_notes: false
