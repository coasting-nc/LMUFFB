name: Manual Release

on:
  workflow_dispatch:
    inputs:
      is_draft:
        description: 'Create as a draft release?'
        type: boolean
        default: false
      is_prerelease:
        description: 'Mark as a pre-release?'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content VERSION -Raw).Trim()
          if (-not $ver) { throw "VERSION file is empty" }
          "TAG=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Target Version: $ver (Tag: v$ver)"

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install ImGui
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "vendor\imgui" -Force
          Invoke-WebRequest -Uri "https://github.com/ocornut/imgui/archive/refs/heads/master.zip" -OutFile "vendor\imgui-master.zip"
          Expand-Archive -Path "vendor\imgui-master.zip" -DestinationPath "vendor" -Force
          Copy-Item "vendor\imgui-master\*" -Destination "vendor\imgui\" -Recurse -Force
          Remove-Item -Path "vendor\imgui-master.zip", "vendor\imgui-master" -Recurse -Force

      - name: Configure and Build (Release)
        shell: pwsh
        run: |
          cmake -S . -B build -DLMUFFB_USE_UNITY_BUILD=ON
          cmake --build build --config Release --clean-first

      - name: Windows Defender Scan
        shell: pwsh
        run: |
          $exePath = "build\Release\LMUFFB.exe"
          
          if (-not (Test-Path $exePath)) {
              Write-Error "Executable not found! It may have been quarantined during the build."
              exit 1
          }
          
          $scanDir = "C:\AV_Scan"
          New-Item -ItemType Directory -Path $scanDir -Force | Out-Null
          $tempPath = Join-Path $scanDir "LMUFFB_scan.exe"
          Copy-Item -Path $exePath -Destination $tempPath -Force
          
          # 1. Deep Environment Diagnostics
          Write-Host "--- Initial Defender Engine State ---"
          $prefs = Get-MpPreference
          Write-Host "Excluded Paths: $($prefs.ExclusionPath)"
          Write-Host "Excluded Extensions: $($prefs.ExclusionExtension)"
          Write-Host "Real-time Protection Disabled: $($prefs.DisableRealtimeMonitoring)"
          Write-Host "Behavior Monitoring Disabled: $($prefs.DisableBehaviorMonitoring)"
          Write-Host "Archive Scanning Disabled: $($prefs.DisableArchiveScanning)"
          Write-Host "Intrusion Prevention System (IPS) Disabled: $($prefs.DisableIntrusionPreventionSystem)"
          Write-Host "IOAV Protection Disabled: $($prefs.DisableIOAVProtection)"
          Write-Host "-------------------------------------`n"
          
          # 2. Strip all existing path exclusions (specifically C:\ and D:\)
          Write-Host "Removing root drive exclusions to force scan..."
          if ($prefs.ExclusionPath) {
              foreach ($path in $prefs.ExclusionPath) {
                  Write-Host " -> Removing exclusion for: $path"
                  Remove-MpPreference -ExclusionPath $path -ErrorAction SilentlyContinue
              }
          }
          
          # 3. Verify the exclusions are actually gone
          $newPrefs = Get-MpPreference
          Write-Host "`nVerified Excluded Paths: $($newPrefs.ExclusionPath)`n"
          
          if ($newPrefs.ExclusionPath -match "C:\\") {
              Write-Warning "Failed to remove C:\ exclusion! GitHub may be enforcing this via Group Policy."
          }
          
          Write-Host "Scanning $tempPath with Windows Defender..."
          
          # 4. Run the scan
          & "C:\Program Files\Windows Defender\MpCmdRun.exe" -Scan -ScanType 3 -File "$tempPath"
          $scanExitCode = $LASTEXITCODE
          
          # 5. Print the Defender log file
          $logPath = "$env:LOCALAPPDATA\Temp\MpCmdRun.log"
          if (Test-Path $logPath) {
              Write-Host "`n--- Windows Defender Detailed Log ---"
              Get-Content $logPath -Encoding Unicode | Select-Object -Last 20
              Write-Host "-----------------------------------`n"
          }
          
          # 6. Cleanup
          Remove-Item -Path $scanDir -Recurse -Force
          
          # 7. Evaluate results
          if ($scanExitCode -eq 2) {
              Write-Error "❌ Windows Defender detected a threat! Workflow failed."
              exit 1
          } elseif ($scanExitCode -eq 0) {
              Write-Host "✅ Windows Defender scan passed. No threats detected."
          } else {
              Write-Warning "⚠️ Windows Defender scan returned unexpected exit code: $scanExitCode"
          }

      - name: Run Tests
        shell: pwsh
        run: |
          .\build\tests\Release\run_combined_tests.exe

      - name: Package Artifacts
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          New-Item -ItemType Directory -Path "dist" -Force
          Copy-Item "build/Release/LMUFFB.exe" -Destination "dist/"
          Copy-Item "build/Release/README.txt" -Destination "dist/"
          Copy-Item "build/Release/tools" -Destination "dist/" -Recurse
          Compress-Archive -Path "dist/*" -DestinationPath "lmuffb-$ver.zip"

      - name: Extract Latest Changelog Entry
        id: changelog
        shell: pwsh
        run: |
          $content = Get-Content CHANGELOG_DEV.md -Raw
          # Regex explained:
          # (?s)      -> Single-line mode (. matches newlines)
          # (## \[    -> Starts with "## ["
          # [^\]]+    -> Matches the version number inside brackets
          # \].+?     -> Matches close bracket and content (non-greedy)
          # (?=## \[  -> Looks ahead for the next version header
          # |\z)      -> OR stops at end of file
          $regex = '(?s)(## \[[^\]]+\].+?)(?=## \[|\z)'
          
          if ($content -match $regex) {
              $latestEntry = $Matches[1].Trim()
              $latestEntry | Out-File -FilePath "LATEST_RELEASE_NOTES.md" -Encoding utf8
              Write-Host "Successfully extracted latest entry."
          } else {
              Write-Host "Warning: Regex failed to extract entry. Using fallback."
              "Release of version ${{ steps.version.outputs.VERSION }}" | Out-File -FilePath "LATEST_RELEASE_NOTES.md" -Encoding utf8
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body_path: LATEST_RELEASE_NOTES.md
          files: |
            lmuffb-${{ steps.version.outputs.VERSION }}.zip
          draft: ${{ github.event.inputs.is_draft }}
          prerelease: ${{ github.event.inputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          generate_release_notes: false
